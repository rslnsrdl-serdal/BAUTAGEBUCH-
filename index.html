<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERO Bautagebuch</title>

<style>
body{
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Roboto,sans-serif;
background:#f5f6f8;
margin:0;
padding:20px;
color:#111;
}

h2{margin-top:30px}

.card{
background:white;
padding:16px;
border-radius:14px;
margin-bottom:14px;
box-shadow:0 2px 6px rgba(0,0,0,.05);
}

button{
padding:8px 14px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
cursor:pointer;
}

input,select,textarea{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-top:4px;
margin-bottom:10px;
}

.timeline-card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
border-left:4px solid #007aff;
}

.small{
font-size:12px;
color:#777;
}
</style>
</head>

<body>

<h1>SERO Bautagebuch</h1>

<div class="card">
<h2>Arbeitsbereiche</h2>

<input id="areaInput" placeholder="Arbeitsbereich hinzufügen">
<button onclick="addArea()">Hinzufügen</button>

<div id="areaList"></div>
</div>

<div class="card">
<h2>Nachunternehmer hinzufügen</h2>

<select id="gewerkSelect"></select>

<input id="nuCode" placeholder="NU Code (z.B. 902.01)">
<input id="nuName" placeholder="Firma Name">

<button onclick="addNU()">Speichern</button>

<div id="nuList"></div>
</div>

<div class="card">
<h2>Tageschronologie</h2>

<input type="time" id="timeInput">

<select id="timelineGewerk"></select>

<select id="timelineFirma"></select>

<textarea id="timelineText" placeholder="Ereignis..."></textarea>

<button onclick="addTimeline()">Event speichern</button>

<div id="timelineList"></div>
</div>

<script>

const GEWERKE = [
["901","Erdarbeiten"],
["902","Betonarbeiten"],
["903","Hallensohle"],
["904","Abdichtung"],
["905","Industrieboden"],
["906","Mauerwerk"],
["908","Fertigteile"],
["910","Tore / Türen"],
["911","Lichtbandwand"],
["912","Dach"],
["913","Lichtkuppeln"],
["915","Brandschutz"],
["916","Innenausbau"],
["918","Maler"],
["919","Fliesen"],
["921","Elektro"],
["923","HKLS"],
["927","Schlosser"],
["928","Baustelleneinrichtung"],
["930","Aufzug"],
["934","Außenanlagen"]
];

let state = JSON.parse(localStorage.getItem("sero_v1")) || {
areas:[],
firmen:[],
timeline:[]
};

function save(){
localStorage.setItem("sero_v1",JSON.stringify(state));
}

function initGewerkSelect(){

const sel=document.getElementById("gewerkSelect");
const sel2=document.getElementById("timelineGewerk");

GEWERKE.forEach(g=>{
let o=document.createElement("option");
o.value=g[0];
o.text=g[0]+" "+g[1];
sel.appendChild(o);

let o2=document.createElement("option");
o2.value=g[0];
o2.text=g[0]+" "+g[1];
sel2.appendChild(o2);
});
}

function addArea(){
let val=document.getElementById("areaInput").value;
if(!val)return;
state.areas.push(val);
save();
renderAreas();
}

function renderAreas(){
let box=document.getElementById("areaList");
box.innerHTML="";
state.areas.forEach(a=>{
let div=document.createElement("div");
div.innerText="📍 "+a;
box.appendChild(div);
});
}

function addNU(){

let code=document.getElementById("nuCode").value;
let name=document.getElementById("nuName").value;
let gewerk=document.getElementById("gewerkSelect").value;

if(!code||!name)return;

state.firmen.push({code,name,gewerk});
save();
renderNU();
}

function renderNU(){

let box=document.getElementById("nuList");
box.innerHTML="";

state.firmen.forEach(f=>{
let div=document.createElement("div");
div.innerText=f.code+" "+f.name+" ("+f.gewerk+")";
box.appendChild(div);
});

renderFirmaDropdown();
}

function renderFirmaDropdown(){

let sel=document.getElementById("timelineFirma");
sel.innerHTML="";

let gw=document.getElementById("timelineGewerk").value;

state.firmen
.filter(f=>f.gewerk===gw)
.forEach(f=>{
let o=document.createElement("option");
o.value=f.code;
o.text=f.code+" "+f.name;
sel.appendChild(o);
});
}

document.getElementById("timelineGewerk")
.addEventListener("change",renderFirmaDropdown);

function addTimeline(){

let time=document.getElementById("timeInput").value;

if(!time){
let now=new Date();
time=now.getHours()+":"+now.getMinutes();
}

let gewerk=document.getElementById("timelineGewerk").value;
let firma=document.getElementById("timelineFirma").value;
let text=document.getElementById("timelineText").value;

if(!text)return;

state.timeline.push({time,gewerk,firma,text});
save();
renderTimeline();
}

function renderTimeline(){

let box=document.getElementById("timelineList");
box.innerHTML="";

state.timeline.reverse().forEach(t=>{

let div=document.createElement("div");
div.className="timeline-card";

div.innerHTML=
"<b>"+t.time+"</b><br>"+
"<span class='small'>"+t.gewerk+" "+t.firma+"</span><br>"+
t.text;

box.appendChild(div);

});
}

initGewerkSelect();
renderAreas();
renderNU();
renderTimeline();

</script>

</body>
</html>
