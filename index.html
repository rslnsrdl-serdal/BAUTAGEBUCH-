<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SERO Bautagebuch</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
background:#f5f6f7;
}

header{
background:white;
padding:14px;
box-shadow:0 2px 6px rgba(0,0,0,.08);
}

.context{
font-size:14px;
color:#444;
display:flex;
gap:18px;
flex-wrap:wrap;
}

.sidebar{
position:fixed;
left:0;
top:0;
bottom:0;
width:260px;
background:white;
overflow:auto;
border-right:1px solid #ddd;
}

.content{
margin-left:260px;
padding:20px;
}

.gewerk{
padding:8px 12px;
cursor:pointer;
}

.gewerk:hover{
background:#f0f0f0;
}

.firma{
padding-left:26px;
font-size:14px;
cursor:pointer;
}

.quick-entry{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
margin-bottom:20px;
}

.timeline-item{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 1px 4px rgba(0,0,0,.08);
}

button{
padding:8px 12px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar" id="sidebar"></div>

<div class="content">

<header>
<div class="context" id="contextBar"></div>
</header>

<br>

<input
class="quick-entry"
id="quickEntry"
placeholder="+ Neuer Eintrag schreiben..."
>

<div id="timeline"></div>

</div>

<script>

/* ---------- CORE STATE ---------- */

let appState =
JSON.parse(localStorage.getItem("sero_state"))
|| createInitialState()


function createInitialState(){

return {

project:{
name:"GI0447",
ort:"Bergkamen",
nummer:"GI0447"
},

gewerke: PRESET_GEWERKE.map(name=>{

let code=name.split(" ")[0]

return{
code,
name,
firmen:[]
}

}),

timeline:[],

context:{
gewerk:null,
firma:null,
bereich:null,
datum:new Date().toISOString().slice(0,10)
}

}

}


/* ---------- PRESET GEWERKE ---------- */

const PRESET_GEWERKE = [

"100 Stahlbau",
"400 Fassade",
"901 Erd- und Entwässerungsarbeiten",
"902 Beton- und Stahlbetonarbeiten",
"903 Hallensohle",
"904 Bauwerksabdichtung",
"905 Industriefußboden Estrich",
"906 Mauerwerksarbeiten",
"908 Betonfertigteile",
"910 Tore, Türen, Überladebrücken",
"911 Lichtbandwand",
"912 Dacheindeckung",
"913 Lichtkuppeln",
"914 Blechverlegearbeiten (906+936)",
"915 Brandschutz",
"916 Innenausbau",
"917 Sonnenschutz",
"918 Malerarbeiten",
"919 Fliesenarbeiten",
"920 Bodenbeläge",
"921 Elektro (840–860+880)",
"922 Löschanlagen (875)",
"923 HKLS (811–830)",
"925 Ingenieurleistungen (1870)",
"927 Schlosserarbeiten",
"928 Baustelleneinrichtung",
"930 Aufzugsanlage",
"934 Außenanlagen"

]


/* ---------- SAVE ---------- */

function saveState(){

localStorage.setItem(
"sero_state",
JSON.stringify(appState)
)

}


/* ---------- SIDEBAR ---------- */

function renderSidebar(){

let html=""

appState.gewerke.forEach(g=>{

html+=`
<div class="gewerk"
onclick="selectGewerk('${g.code}')">

📁 ${g.name}

</div>
`

g.firmen.forEach(f=>{

html+=`
<div class="firma"
onclick="selectFirma('${f.code}')">

🏢 ${f.code} ${f.name}

</div>
`

})

html+=`
<div class="firma"
onclick="addFirma('${g.code}')">

➕ Firma hinzufügen

</div>
`

})

document.getElementById("sidebar").innerHTML=html

}


/* ---------- GEWERK SELECT ---------- */

function selectGewerk(code){

appState.context.gewerk=code
appState.context.firma=null

renderContext()

}


/* ---------- FIRMA ADD ---------- */

function addFirma(gewerkCode){

let name=prompt("Firmenname eingeben")

if(!name)return

let gewerk=
appState.gewerke.find(g=>g.code==gewerkCode)

let next=
gewerk.firmen.length+1

let code=
gewerkCode+"."+
String(next).padStart(2,"0")

gewerk.firmen.push({

code,
name

})

saveState()
renderSidebar()

}


/* ---------- FIRMA SELECT ---------- */

function selectFirma(code){

appState.context.firma=code
renderContext()

}


/* ---------- CONTEXT ---------- */

function renderContext(){

let c=appState.context

document.getElementById("contextBar").innerHTML=`

Projekt: ${appState.project.name}

Gewerk: ${c.gewerk||"-"}

Firma: ${c.firma||"-"}

Datum: ${c.datum}

`

}


/* ---------- QUICK ENTRY ---------- */

document
.getElementById("quickEntry")
.addEventListener("keypress",e=>{

if(e.key!="Enter")return

let text=e.target.value.trim()

if(!text)return

parseCommand(text)

e.target.value=""

})


/* ---------- COMMAND PARSER ---------- */

function parseCommand(text){

if(text.startsWith("!m"))
return addTimeline(text.slice(2),"MANGEL")

if(text.startsWith("!a"))
return addTimeline(text.slice(2),"AUFGABE")

if(text.startsWith("!f"))
return addTimeline(text.slice(2),"FOTO")

if(text.startsWith("!g"))
return addTimeline(text.slice(2),"GERÄT")

if(text.startsWith("!c"))
return addTimeline(text.slice(2),"CONTAINER")

if(text.startsWith("!b"))
return addTimeline(text.slice(2),"BESPRECHUNG")

addTimeline(text,"TIMELINE")

}


/* ---------- ADD TIMELINE ---------- */

function addTimeline(text,type){

appState.timeline.unshift({

text,
type,

gewerk:
appState.context.gewerk,

firma:
appState.context.firma,

datum:
new Date().toISOString(),

})

saveState()

renderTimeline()

}


/* ---------- RENDER TIMELINE ---------- */

function renderTimeline(){

let html=""

appState.timeline.forEach(t=>{

html+=`

<div class="timeline-item">

<b>${t.type}</b><br>
${t.text}

</div>

`

})

document.getElementById("timeline").innerHTML=html

}


/* ---------- INIT ---------- */

renderSidebar()
renderContext()
renderTimeline()

</script>

</body>
</html>
