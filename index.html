<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SERO Bautagebuch – Core Engine</title>
<style>
  :root{
    --bg:#f5f7fb;--card:#ffffff;--line:#d9e1ee;--text:#172033;--muted:#6b7890;
    --accent:#0b6cf0;--accent2:#f59e0b;--good:#16a34a;--bad:#dc2626;--warn:#d97706;
    --shadow:0 8px 24px rgba(15,23,42,.08);--r:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
  .app{max-width:1500px;margin:0 auto;padding:16px}
  .topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);padding:14px 16px;border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);position:sticky;top:10px;z-index:20}
  .brand{display:flex;gap:12px;align-items:center}
  .logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#0b6cf0,#56b3ff);display:grid;place-items:center;color:#fff;font-weight:800}
  .brand h1{font-size:18px;margin:0}
  .brand p{margin:2px 0 0;color:var(--muted);font-size:12px}
  .top-actions{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
  .save-pill{padding:8px 12px;border:1px solid var(--line);background:#f8fbff;border-radius:999px;font-size:12px;color:var(--muted)}
  button,input,select,textarea{font:inherit}
  button{border:none;background:var(--accent);color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}
  button.secondary{background:#eef4ff;color:#0b56c0;border:1px solid #cfe0ff}
  button.ghost{background:#fff;color:var(--text);border:1px solid var(--line)}
  button.warn{background:#fff7ed;color:#b45309;border:1px solid #fed7aa}
  button.danger{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
  .tab{background:#fff;color:var(--muted);border:1px solid var(--line)}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
  .page{display:none}
  .page.active{display:block}
  .grid{display:grid;gap:16px}
  .grid-2{grid-template-columns:1.1fr .9fr}
  .grid-3{grid-template-columns:repeat(3,1fr)}
  .grid-4{grid-template-columns:repeat(4,1fr)}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
  .card h3{margin:0;font-size:16px}
  .card-head{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid var(--line);gap:12px}
  .card-body{padding:16px}
  .fields{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .fields-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .fields-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600}
  input,select,textarea{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:12px;background:#fff}
  textarea{min-height:90px;resize:vertical}
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:var(--shadow)}
  .stat .label{font-size:12px;color:var(--muted)}
  .stat .value{font-size:28px;font-weight:800;margin-top:8px}
  .tree{display:flex;flex-direction:column;gap:10px}
  .trade{border:1px solid var(--line);border-radius:16px;background:#fff;overflow:hidden}
  .trade-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#f8fbff;border-bottom:1px solid var(--line);gap:8px;flex-wrap:wrap}
  .trade-title{font-weight:800}
  .trade-sub{font-size:12px;color:var(--muted)}
  .firm-list{padding:8px 12px 12px;display:flex;flex-direction:column;gap:8px}
  .firm-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px;border:1px solid var(--line);border-radius:14px;background:#fff}
  .firm-main{display:flex;flex-direction:column;gap:2px}
  .firm-title{font-weight:700}
  .firm-meta{font-size:12px;color:var(--muted)}
  .badges{display:flex;gap:6px;flex-wrap:wrap}
  .badge{padding:5px 9px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid var(--line);background:#f8fafc;color:var(--muted)}
  .badge.m{background:#fff1f2;color:#b91c1c;border-color:#fecdd3}
  .badge.a{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
  .badge.p{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
  .badge.ctx{background:#fff7ed;color:#b45309;border-color:#fed7aa}
  .list{display:flex;flex-direction:column;gap:10px}
  .item{border:1px solid var(--line);border-radius:14px;padding:14px;background:#fff}
  .item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .item-title{font-weight:700}
  .item-meta{font-size:12px;color:var(--muted);margin-top:6px;line-height:1.5}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap}
  .mini{padding:7px 10px;font-size:12px;border-radius:10px}
  .dropzone{border:2px dashed #bfd4fb;background:#f8fbff;border-radius:16px;padding:18px;text-align:center;color:var(--muted)}
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-top:14px}
  .photo{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff}
  .photo img{width:100%;height:140px;object-fit:cover;background:#eef2f7}
  .photo .meta{padding:10px;font-size:12px;color:var(--muted);line-height:1.45}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .empty{padding:24px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:14px;background:#fff}
  .toast{position:fixed;right:16px;bottom:16px;background:#0f172a;color:#fff;padding:12px 14px;border-radius:12px;opacity:0;transform:translateY(12px);transition:.2s;z-index:50}
  .toast.show{opacity:1;transform:translateY(0)}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .hr{height:1px;background:var(--line);margin:14px 0}
  @media (max-width:1100px){.stats,.grid-4,.fields-4{grid-template-columns:repeat(2,1fr)}.grid-2,.grid-3,.fields-3,.fields{grid-template-columns:1fr}}
  @media (max-width:700px){.stats,.grid-4,.fields-4{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:stretch}.top-actions{justify-content:flex-start}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="logo">SB</div>
      <div>
        <h1>SERO Bautagebuch</h1>
        <p>Core Engine · appState tabanlı stabil sürüm</p>
      </div>
    </div>
    <div class="top-actions">
      <div class="save-pill" id="saveStatus">Kayıtlı</div>
      <button class="secondary" id="exportJsonBtn">JSON Backup</button>
      <button class="secondary" id="exportExcelBtn">Excel CSV Export</button>
      <button class="ghost" id="importJsonBtn">JSON Import</button>
      <input id="importJsonInput" type="file" accept="application/json,.json" hidden>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <section class="page active" id="page-dashboard"></section>
  <section class="page" id="page-tree"></section>
  <section class="page" id="page-aufgaben"></section>
  <section class="page" id="page-maengel"></section>
  <section class="page" id="page-timeline"></section>
  <section class="page" id="page-fotos"></section>
  <section class="page" id="page-geraete"></section>
  <section class="page" id="page-container"></section>
  <section class="page" id="page-besprechungen"></section>
  <section class="page" id="page-settings"></section>
</div>
<div class="toast" id="toast"></div>

<script>
'use strict';

const STORAGE_KEY = 'sero_bautagebuch_appState_v1';
const PHOTO_DB_NAME = 'sero_bautagebuch_photos_v1';
const PHOTO_STORE = 'photos';

const DEFAULT_GEWERKE = [
  ['000','TGA-Unterlagen'],['001','Mindestlohnerklärungen'],['100','Stahlbau'],['400','Fassade'],
  ['901','Erd-u.Entwässerungsarbeiten'],['902','Beton- und Stahlbetonarbeiten'],['903','Hallensohle'],
  ['904','Bauwerksabdichtung'],['905','Industriefußboden Estrich'],['906','Mauerwerksarbeiten'],
  ['908','Betonfertigteile'],['910','Tore, Türen, Überladebrücken'],['911','Lichtbandwand'],
  ['912','Dacheindeckung'],['913','Lichtkuppeln'],['914','Blechverlegearbeiten (906+936)'],
  ['915','Brandschutz'],['916','Innenausbau'],['917','Sonnenschutz'],['918','Malerarbeiten'],
  ['919','Fliesenarbeiten'],['920','Bodenbeläge'],['921','Elektro (840-860+880)'],['922','Löschanlagen (875)'],
  ['923','HKLS (811-830)'],['925','Ingenieurleistungen (1870)'],['927','Schlosserarbeiten'],
  ['928','Baustelleneinrichtung'],['930','Aufzugsanlage'],['934','Außenanlagen'],['965','xxx'],['SV','BW']
];

const TABS = [
  ['dashboard','Dashboard'],['tree','Gewerk / Firmen'],['aufgaben','Aufgaben'],['maengel','Mängel'],
  ['timeline','Timeline'],['fotos','Fotos'],['geraete','Geräte'],['container','Container'],['besprechungen','Besprechungen'],['settings','Settings']
];

let photoDB = null;
let saveTimer = null;

function uid(prefix='id'){ return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtDate(v){ return v || ''; }
function esc(s){ return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._h); t._h=setTimeout(()=>t.classList.remove('show'),1800); }
function debounceSave(){ markSaving('Kaydediliyor…'); clearTimeout(saveTimer); saveTimer=setTimeout(saveNow,250); }
function markSaving(text){ document.getElementById('saveStatus').textContent=text; }

function getDefaultState(){
  return {
    project: { name:'GI 0447 DHL Bayer Bergkamen', ort:'Bergkamen', nummer:'GI0447', bauleiter:'Serdal Arslan', erstelltAm: todayISO() },
    settings: {
      language:'de', showTurkishLabels:true, autoContext:true, dailyResetTimeline:false,
      keepDevices:true, keepContainer:true, photoStorage:'indexeddb', excelPreferences:{ separator:';', includePhotosMeta:true }
    },
    gewerke: DEFAULT_GEWERKE.map((g, i) => ({ code:g[0], name_de:g[1], name_tr:'', status:'aktiv', order:i+1 })),
    firmen: [
      { id:uid('firma'), code:'902.01', name:'Skokotas', gewerkCode:'902', telefon:'', mail:'', ansprechpartner:'', notizen:'' },
      { id:uid('firma'), code:'903.01', name:'PERI', gewerkCode:'903', telefon:'', mail:'', ansprechpartner:'', notizen:'' }
    ],
    arbeitsbereiche: [],
    timeline: [],
    aufgaben: [],
    maengel: [],
    fotos: [],
    geraete: [],
    container: [],
    besprechungen: [],
    archiv: { lastFilter:'', lastRange:'', lastView:'dashboard' },
    context: { gewerk:'902', firma:'', arbeitsbereich:'', datum:todayISO() }
  };
}

let appState = loadState();

function normalizeState(raw){
  const base = getDefaultState();
  const merged = structuredClone(base);
  for (const k of Object.keys(base)) {
    if (raw && typeof raw[k] !== 'undefined') merged[k] = raw[k];
  }
  merged.project = { ...base.project, ...(raw?.project||{}) };
  merged.settings = { ...base.settings, ...(raw?.settings||{}), excelPreferences:{ ...base.settings.excelPreferences, ...(raw?.settings?.excelPreferences||{}) } };
  merged.archiv = { ...base.archiv, ...(raw?.archiv||{}) };
  merged.context = { ...base.context, ...(raw?.context||{}) };
  for (const key of ['gewerke','firmen','arbeitsbereiche','timeline','aufgaben','maengel','fotos','geraete','container','besprechungen']) {
    if (!Array.isArray(merged[key])) merged[key] = [];
  }
  return merged;
}

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return getDefaultState();
    return normalizeState(JSON.parse(raw));
  } catch(err) {
    console.error(err);
    return getDefaultState();
  }
}

function saveNow(){
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
    markSaving('Kayıtlı · ' + new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}));
  } catch(err) {
    console.error(err);
    markSaving('Kaydetme hatası');
    toast('Kaydetme hatası');
  }
}

function findGewerkName(code){
  const g = appState.gewerke.find(x => x.code === code);
  return g ? `${g.code} ${g.name_de}` : code || '—';
}
function findFirmaName(id){
  const f = appState.firmen.find(x => x.id === id);
  return f ? `${f.code || ''} ${f.name}`.trim() : '—';
}
function countByFirma(fid){
  return {
    maengel: appState.maengel.filter(x => x.firma === fid).length,
    aufgaben: appState.aufgaben.filter(x => x.firma === fid).length,
    fotos: appState.fotos.filter(x => x.firma === fid).length
  };
}
function getFilteredFirmenByContext(){
  return appState.context.gewerk ? appState.firmen.filter(f => f.gewerkCode === appState.context.gewerk) : appState.firmen;
}

function bindContext(record){
  if (!appState.settings.autoContext) return record;
  return {
    ...record,
    datum: record.datum || appState.context.datum || todayISO(),
    gewerk: record.gewerk || appState.context.gewerk || '',
    firma: record.firma || appState.context.firma || '',
    bereich: record.bereich || appState.context.arbeitsbereich || ''
  };
}

function setPage(page){
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${page}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.page===page));
  appState.archiv.lastView = page;
  debounceSave();
}

function renderTabs(){
  const box = document.getElementById('tabs');
  box.innerHTML = TABS.map(([id,label]) => `<button class="tab ${appState.archiv.lastView===id?'active':''}" data-page="${id}">${label}</button>`).join('');
  box.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => setPage(btn.dataset.page)));
}

function renderDashboard(){
  const el = document.getElementById('page-dashboard');
  const offeneAufgaben = appState.aufgaben.filter(x => x.status !== 'done').length;
  const offeneMaengel = appState.maengel.filter(x => x.status !== 'erledigt').length;
  el.innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <div class="card-head"><h3>Projekt</h3><span class="badge ctx">Context aktiv</span></div>
        <div class="card-body">
          <div class="fields">
            <div><label>Projektname</label><input id="project_name" value="${esc(appState.project.name)}"></div>
            <div><label>Ort</label><input id="project_ort" value="${esc(appState.project.ort)}"></div>
            <div><label>Nummer</label><input id="project_nummer" value="${esc(appState.project.nummer)}"></div>
            <div><label>Bauleiter</label><input id="project_bauleiter" value="${esc(appState.project.bauleiter)}"></div>
          </div>
          <div class="hr"></div>
          <div class="fields-4">
            <div><label>Aktives Gewerk</label>${renderGewerkSelect('ctx_gewerk', appState.context.gewerk, true)}</div>
            <div><label>Aktive Firma</label>${renderFirmaSelect('ctx_firma', appState.context.firma, true)}</div>
            <div><label>Aktiver Arbeitsbereich</label>${renderBereichSelect('ctx_bereich', appState.context.arbeitsbereich)}</div>
            <div><label>Datum</label><input type="date" id="ctx_datum" value="${esc(appState.context.datum)}"></div>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Veri mimarisi</h3><span class="small muted">appState</span></div>
        <div class="card-body small">
          <div><strong>project</strong>, <strong>settings</strong>, <strong>gewerke</strong>, <strong>firmen</strong>, <strong>arbeitsbereiche</strong>, <strong>timeline</strong>, <strong>aufgaben</strong>, <strong>maengel</strong>, <strong>fotos</strong>, <strong>geraete</strong>, <strong>container</strong>, <strong>besprechungen</strong>, <strong>archiv</strong>, <strong>context</strong></div>
          <div class="hr"></div>
          <div class="muted">JSON backup, IndexedDB foto referansı ve offline kullanım için doğrudan bu yapı kaydedilir.</div>
        </div>
      </div>
    </div>
    <div style="height:16px"></div>
    <div class="stats">
      <div class="stat"><div class="label">Gewerke</div><div class="value">${appState.gewerke.length}</div></div>
      <div class="stat"><div class="label">Firmen</div><div class="value">${appState.firmen.length}</div></div>
      <div class="stat"><div class="label">Offene Aufgaben</div><div class="value">${offeneAufgaben}</div></div>
      <div class="stat"><div class="label">Offene Mängel</div><div class="value">${offeneMaengel}</div></div>
      <div class="stat"><div class="label">Fotos</div><div class="value">${appState.fotos.length}</div></div>
    </div>
    <div style="height:16px"></div>
    <div class="grid grid-2">
      <div class="card">
        <div class="card-head"><h3>Rozetli Tree Önizleme</h3></div>
        <div class="card-body">${renderTreeHtml().slice(0, 5000)}</div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Bugünkü context özeti</h3></div>
        <div class="card-body list">
          <div class="item"><div class="item-title">Gewerk</div><div class="item-meta">${esc(findGewerkName(appState.context.gewerk))}</div></div>
          <div class="item"><div class="item-title">Firma</div><div class="item-meta">${esc(findFirmaName(appState.context.firma))}</div></div>
          <div class="item"><div class="item-title">Bereich</div><div class="item-meta">${esc(appState.context.arbeitsbereich || '—')}</div></div>
          <div class="item"><div class="item-title">Datum</div><div class="item-meta">${esc(appState.context.datum || '—')}</div></div>
        </div>
      </div>
    </div>`;

  bindInput('project_name', v => appState.project.name = v);
  bindInput('project_ort', v => appState.project.ort = v);
  bindInput('project_nummer', v => appState.project.nummer = v);
  bindInput('project_bauleiter', v => appState.project.bauleiter = v);
  bindInput('ctx_gewerk', v => { appState.context.gewerk = v; if (appState.context.firma && !appState.firmen.some(f => f.id===appState.context.firma && f.gewerkCode===v)) appState.context.firma=''; rerender(); });
  bindInput('ctx_firma', v => appState.context.firma = v);
  bindInput('ctx_bereich', v => appState.context.arbeitsbereich = v);
  bindInput('ctx_datum', v => appState.context.datum = v);
}

function renderTreeHtml(){
  const gewerke = [...appState.gewerke].sort((a,b)=>(a.order||999)-(b.order||999) || String(a.code).localeCompare(String(b.code)));
  if (!gewerke.length) return `<div class="empty">Gewerk yok</div>`;
  return `<div class="tree">${gewerke.map(g => {
    const firms = appState.firmen.filter(f => f.gewerkCode === g.code);
    const tradeCounts = {
      maengel: appState.maengel.filter(x => x.gewerk === g.code).length,
      aufgaben: appState.aufgaben.filter(x => x.gewerk === g.code).length,
      fotos: appState.fotos.filter(x => x.gewerk === g.code).length
    };
    return `<div class="trade">
      <div class="trade-head">
        <div>
          <div class="trade-title">📁 ${esc(g.code)} ${esc(g.name_de)}</div>
          <div class="trade-sub">${esc(g.name_tr || '')}</div>
        </div>
        <div class="badges">
          <span class="badge m">⚠${tradeCounts.maengel}</span>
          <span class="badge a">📋${tradeCounts.aufgaben}</span>
          <span class="badge p">📷${tradeCounts.fotos}</span>
        </div>
      </div>
      <div class="firm-list">
        ${firms.length ? firms.map(f => { const c = countByFirma(f.id); return `<div class="firm-row">
          <div class="firm-main">
            <div class="firm-title">🏢 ${esc(f.code || '')} ${esc(f.name)}</div>
            <div class="firm-meta">${esc(f.ansprechpartner || '')}</div>
          </div>
          <div class="badges">
            <span class="badge m">⚠${c.maengel}</span>
            <span class="badge a">📋${c.aufgaben}</span>
            <span class="badge p">📷${c.fotos}</span>
          </div>
        </div>`; }).join('') : `<div class="empty">Bu gewerk altında firma yok</div>`}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderTreePage(){
  const el = document.getElementById('page-tree');
  el.innerHTML = `
    <div class="grid grid-2">
      <div class="card">
        <div class="card-head"><h3>Gewerk ekle</h3></div>
        <div class="card-body">
          <div class="fields-4">
            <div><label>Code</label><input id="new_gewerk_code"></div>
            <div><label>Name DE</label><input id="new_gewerk_name"></div>
            <div><label>Name TR</label><input id="new_gewerk_name_tr"></div>
            <div><label>Order</label><input id="new_gewerk_order" type="number" value="${appState.gewerke.length + 1}"></div>
          </div>
          <div style="height:12px"></div>
          <button id="addGewerkBtn">Gewerk ekle</button>
        </div>
      </div>
      <div class="card">
        <div class="card-head"><h3>Firma ekle</h3></div>
        <div class="card-body">
          <div class="fields-4">

        </div>

  if (!appState.fotos.length) { grid.innerHTML = `<div class="empty" style="grid-column:1/-1">Foto yok</div>`; return; }

    items.push(`<div class="photo"><img src="${esc(src)}" alt=""><div class="meta"><div><strong>${esc(meta.filename)}</strong></div><div>${esc(meta.datum||'')} · ${esc(findGewerkName(meta.gewerk))}</div><div>${esc(findFirmaName(meta.firma))} · ${esc(meta.bereich||'—')}</div><div>${esc(meta.quelle||'')}</div><div style="margin-top:8px"><button class="mini danger row-delete" data-kind="fotos" data-id="${meta.id}">Sil</button></div></div></div>`);

  grid.innerHTML = items.join('');
  wireRowButtons();
}

async function savePhotoFromForm(){
  const input = document.getElementById('photo_file');
  const file = input.files?.[0];
  if (!file) return toast('Foto seç');
  const dataUrl = await fileToDataUrl(file);
  const id = uid('foto');
  const refId = uid('blob');
  await idbSetPhoto({ id:refId, dataUrl });
  appState.fotos.unshift(bindContext({ id, filename:file.name, datum:val('photo_datum'), gewerk:val('photo_gewerk'), firma:val('photo_firma'), bereich:val('photo_bereich').trim(), quelle:val('photo_quelle').trim(), refId }));
  debounceSave(); rerender(); toast('Foto kaydedildi');
}

}

function renderGewerkSelect(id, selected='', includeBlank=false){
  const opts = [...appState.gewerke].sort((a,b)=>(a.order||999)-(b.order||999)).map(g => `<option value="${esc(g.code)}" ${g.code===selected?'selected':''}>${esc(g.code)} ${esc(g.name_de)}</option>`).join('');
  return `<select id="${id}">${includeBlank?'<option value="">—</option>':''}${opts}</select>`;
}
function renderFirmaSelect(id, selected='', includeBlank=false){
  const firms = appState.context.gewerk ? appState.firmen.filter(f => !selected ? f.gewerkCode===appState.context.gewerk : true) : appState.firmen;
  const opts = firms.map(f => `<option value="${esc(f.id)}" ${f.id===selected?'selected':''}>${esc((f.code||'') + ' ' + f.name)}</option>`).join('');
  return `<select id="${id}">${includeBlank?'<option value="">—</option>':''}${opts}</select>`;
}
function renderBereichSelect(id, selected=''){
  return `<select id="${id}"><option value="">—</option>${appState.arbeitsbereiche.map(a => `<option value="${esc(a.name)}" ${a.name===selected?'selected':''}>${esc(a.name)}</option>`).join('')}</select>`;
}

function bindInput(id, fn){ const el=document.getElementById(id); if (!el) return; el.addEventListener('input', e => { fn(e.target.value); debounceSave(); }); }
function val(id){ return document.getElementById(id)?.value ?? ''; }
function setSelect(id, v){ const el=document.getElementById(id); if (el) el.value = v; }

function wireRowButtons(){
  document.querySelectorAll('.row-delete').forEach(btn => btn.addEventListener('click', async () => {
    const kind = btn.dataset.kind; const id = btn.dataset.id;
    if (kind === 'fotos') {
      const item = appState.fotos.find(x => x.id === id);
      if (item?.refId) await idbDeletePhoto(item.refId);
    }
    appState[kind] = appState[kind].filter(x => x.id !== id);
    debounceSave(); rerender(); toast('Silindi');
  }));
  document.querySelectorAll('.row-cycle-status').forEach(btn => btn.addEventListener('click', () => {
    const kind = btn.dataset.kind; const id = btn.dataset.id; const arr = appState[kind]; const item = arr.find(x => x.id === id); if (!item) return;
    if (kind === 'aufgaben') { const seq=['today','tomorrow','done']; item.status = seq[(seq.indexOf(item.status)+1)%seq.length]; }
    if (kind === 'maengel') { const seq=['offen','bearbeitung','erledigt']; item.status = seq[(seq.indexOf(item.status)+1)%seq.length]; }
    debounceSave(); rerender(); toast('Durum güncellendi');
  }));
}

function rerender(){
  renderTabs();
  renderDashboard();
  renderTreePage();
  renderAufgabenPage();
  renderMaengelPage();
  renderTimelinePage();
  renderGeraetePage();
  renderContainerPage();
  renderBesprechungenPage();
  renderSettingsPage();
  renderFotosPage();
  setPage(appState.archiv.lastView || 'dashboard');
}

async function openPhotoDB(){
  if (photoDB) return photoDB;
  photoDB = await new Promise((resolve,reject) => {
    const req = indexedDB.open(PHOTO_DB_NAME,1);
    req.onupgradeneeded = () => { if (!req.result.objectStoreNames.contains(PHOTO_STORE)) req.result.createObjectStore(PHOTO_STORE,{ keyPath:'id' }); };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return photoDB;
}
async function idbSetPhoto(record){ const db = await openPhotoDB(); return new Promise((resolve,reject)=>{ const tx=db.transaction(PHOTO_STORE,'readwrite'); tx.objectStore(PHOTO_STORE).put(record); tx.oncomplete=()=>resolve(true); tx.onerror=()=>reject(tx.error); }); }
async function idbGetPhoto(id){ const db = await openPhotoDB(); return new Promise((resolve,reject)=>{ const tx=db.transaction(PHOTO_STORE,'readonly'); const req=tx.objectStore(PHOTO_STORE).get(id); req.onsuccess=()=>resolve(req.result||null); req.onerror=()=>reject(req.error); }); }
async function idbDeletePhoto(id){ const db = await openPhotoDB(); return new Promise((resolve,reject)=>{ const tx=db.transaction(PHOTO_STORE,'readwrite'); tx.objectStore(PHOTO_STORE).delete(id); tx.oncomplete=()=>resolve(true); tx.onerror=()=>reject(tx.error); }); }
function fileToDataUrl(file){ return new Promise((resolve,reject)=>{ const r=new FileReader(); r.onload=()=>resolve(r.result); r.onerror=()=>reject(r.error); r.readAsDataURL(file); }); }

function exportJson(){
  const blob = new Blob([JSON.stringify(appState, null, 2)], {type:'application/json'});
  downloadBlob(blob, `sero_bautagebuch_backup_${todayISO()}.json`);
}
function importJson(file){
  const r = new FileReader();
  r.onload = () => {
    try {
      appState = normalizeState(JSON.parse(r.result));
      saveNow(); rerender(); toast('JSON içe aktarıldı');
    } catch(err){ console.error(err); toast('JSON hatalı'); }
  };
  r.readAsText(file);
}
function exportExcelLikeCsv(){
  const rows = [];
  rows.push(['TYPE','ID','TITLE','DATE','TIME','GEWERK','FIRMA','BEREICH','STATUS','META']);
  appState.timeline.forEach(x => rows.push(['timeline',x.id,x.text,x.datum,x.uhrzeit,x.gewerk,findFirmaName(x.firma),x.bereich,'',JSON.stringify(x.fotoIds||[])]));
  appState.aufgaben.forEach(x => rows.push(['aufgabe',x.id,x.titel,x.datum,x.uhrzeit,x.gewerk,findFirmaName(x.firma),x.bereich,x.status,JSON.stringify(x.fotoIds||[])]));
  appState.maengel.forEach(x => rows.push(['mangel',x.id,x.beschreibung,x.datum,'',x.gewerk,findFirmaName(x.firma),x.bereich,x.status,JSON.stringify(x.fotoIds||[])]));
  appState.fotos.forEach(x => rows.push(['foto',x.id,x.filename,x.datum,'',x.gewerk,findFirmaName(x.firma),x.bereich,'',x.refId]));
  const sep = appState.settings.excelPreferences.separator || ';';
  const csv = rows.map(r => r.map(v => '"' + String(v ?? '').replace(/"/g,'""') + '"').join(sep)).join('\n');
  downloadBlob(new Blob([csv], {type:'text/csv;charset=utf-8'}), `sero_bautagebuch_export_${todayISO()}.csv`);
}
function downloadBlob(blob, name){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000); }

function setupTopActions(){
  document.getElementById('exportJsonBtn').addEventListener('click', exportJson);
  document.getElementById('exportExcelBtn').addEventListener('click', exportExcelLikeCsv);
  document.getElementById('importJsonBtn').addEventListener('click', () => document.getElementById('importJsonInput').click());
  document.getElementById('importJsonInput').addEventListener('change', e => { const file = e.target.files?.[0]; if (file) importJson(file); e.target.value=''; });
}

(async function init(){
  appState = normalizeState(appState);
  await openPhotoDB();
  setupTopActions();
  rerender();
  saveNow();
})();
</script>
